name = "filzy-extractor"
main = "src/index.js"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]

# The Worker only proxies metadata requests and streams selected source bytes.
# Parsing, format selection, muxing, and conversion remain in the browser.
[vars]
ALLOWED_ORIGINS = "https://filzy.site,https://www.filzy.site,http://localhost:5173,http://127.0.0.1:5173"

[browser]
binding = "BROWSER"
